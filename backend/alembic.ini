# A generic, single database configuration.

# ----- 基本設定 -----
[alembic]
# マイグレーションスクリプト（env.pyやversions/）が配置されているディレクトリへのパス
script_location = app/alembic

# マイグレーションファイルを生成する際のファイル名テンプレート
# file_template = %%(rev)s_%%(slug)s

# マイグレーションファイル内の日時やファイル名に使用するタイムゾーン
# 値は dateutil.tz.gettz() に渡されます。空欄の場合はローカルタイムを使用します
# timezone =

# ファイル名に含まれるメッセージ（slug）部分の最大文字数
# truncate_slug_length = 40

# 'revision' コマンド実行時に環境（env.py）をロードするかどうかの設定
# 'true' にすると、autogenerateを使用しない場合でもDB接続などが行われます
# 通常は autogenerate オプション使用時以外は不要
# revision_environment = false

# ソースコード(.py)が存在しないコンパイル済みファイル(.pyc, .pyo)を
# リビジョンとして検出することを許可するかどうかの設定
# sourceless = false

# バージョンファイル（マイグレーションスクリプト）の保存場所
# デフォルトは alembic/versions です。複数のディレクトリを使用する場合などに指定します
# version_locations = %(here)s/bar %(here)s/bat alembic/versions

# script.py.mako からリビジョンファイルを書き出す際のエンコーディング
# output_encoding = utf-8

# ----- ログ設定（Pythonのloggingモジュール準拠） -----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
# 全体のログレベルはWARN（警告以上のみ出力）
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
# SQLAlchemyのログレベル。WARNにすることで大量のSQLログ出力を抑制しています
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# Alembicのログレベル。INFOにすることでマイグレーションの実行状況を表示します
level = INFO
handlers =
qualname = alembic

[handler_console]
# 標準エラー出力へのログ出力設定
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# ログの出力フォーマット定義
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
